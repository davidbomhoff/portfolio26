<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Bomhoff — Designer</title>
  <meta name="description" content="Portfolio of David Bomhoff — UX design, graphic design, and playable experiments.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="hero">
    <!-- Decorative fox shape, behind everything else. alt="" + aria-hidden because it carries no information. -->
    <div class="hero-illustration" aria-hidden="true">
      <img src="./assets/icons/home-fox.svg" alt="">
    </div>

    <div class="hero-top">
      <a class="brand-lockup" href="./index.html">
        <img src="./assets/icons/logo-swirl.svg" alt="" aria-hidden="true">
        <!-- The visible "avid"/"omhoff" are only half the name — the ring illustration draws the D and B.
             A screen reader can't see the illustration, so the real heading text is hidden off-screen instead. -->
        <h1 class="brand-name">
          <span class="visually-hidden">David Bomhoff — Home</span>
          <span class="name-avid" aria-hidden="true">avid</span>
          <span class="name-omhoff" aria-hidden="true">omhoff</span>
        </h1>
      </a>

      <p class="hero-tagline">
        <img src="./assets/icons/speech-bubble.svg" alt="" aria-hidden="true">
        <span>he has a bachelor's degree in graphic design and a ux minor! what a creative guy</span>
      </p>
    </div>

    <p class="hero-cta">choose your experience:</p>

    <!-- data-mode connects each button to the gallery filter in main.js -->
    <nav class="mode-buttons" aria-label="Portfolio sections">
      <button class="mode-btn mode-btn--graphic" data-mode="graphic" onclick="location.href='./graphic.html'">graphic design</button>
      <button class="mode-btn mode-btn--ux" data-mode="ux" onclick="location.href='./ux.html'">ux design</button>
      <button class="mode-btn mode-btn--casino" data-mode="arcade" onclick="location.href='./arcade.html'">casino</button>
    </nav>
  </header>

  <!-- Tan "pedestal" band from the Figma Home frame — full-width on purpose, so it sits outside .wrap's max-width -->
  <main class="gallery-shelf">
    <div class="wrap">
      <!-- main.js fills this with your works array, duplicated for a seamless loop -->
      <div class="gallery-viewport">
        <div class="gallery-track"></div>
      </div>
    </div>
  </main>
  <script src="./js/main.js"></script>
</body>
</html>
