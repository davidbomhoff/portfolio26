<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphic Design — David Bomhoff</title>
  <meta name="description" content="Graphic design work by David Bomhoff — branding, packaging, and print.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="graphic-page">
  <header class="graphic-hero">
    <a class="back-link" href="./index.html">&larr; Home</a>
    <div class="brand-lockup">
      <img class="logo-drag" src="./assets/icons/logo-swirl.svg" alt="" aria-hidden="true">
      <h1 class="brand-name">
        <span class="visually-hidden">David Bomhoff</span>
        <span class="name-avid" aria-hidden="true">avid</span>
        <span class="name-omhoff" aria-hidden="true">omhoff</span>
      </h1>
    </div>
    <!-- Decorative wolf shape — desktop only, see the min-width media query in styles.css -->
    <div class="graphic-illustration" aria-hidden="true">
      <img src="./assets/icons/graphic-wolf.svg" alt="">
    </div>
  </header>

  <main class="graphic-body">
    <div class="wrap">
      <!-- Each entry: an illuminated-letter image standing in for the drop-cap first letter,
           so "D" + "ongle" reads as "Dongle" — alt="D" keeps that meaning for screen readers.
           Placeholder copy from the Figma file — swap in real project write-ups when ready. -->
      <ul class="graphic-list">
        <li class="graphic-item">
          <img class="dropcap" src="./assets/graphic/letter-d.png" alt="D">
          <div class="graphic-copy">
            <h2>ongle</h2>
            <p>Yeah. I made some things with <span class="hl hl-blue">Elation Properties</span> and a brand for my UX project <span class="hl hl-pink">Boostra</span> as well!</p>
          </div>
        </li>
        <li class="graphic-item">
          <img class="dropcap" src="./assets/graphic/letter-j.png" alt="J">
          <div class="graphic-copy">
            <h2>ongle</h2>
            <p>Jonleongleopolis. I bongle <span class="hl hl-mint">dongle</span> with the <span class="hl hl-orange">populus</span></p>
          </div>
        </li>
        <li class="graphic-item">
          <img class="dropcap" src="./assets/graphic/letter-b.png" alt="B">
          <div class="graphic-copy">
            <h2>ongle</h2>
            <p>Jonleongleopolis. I bongle <span class="hl hl-mint">dongle</span> with the <span class="hl hl-orange">populus</span></p>
          </div>
        </li>
      </ul>
    </div>
  </main>
  <script src="./js/main.js"></script>
</body>
</html>
